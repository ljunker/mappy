<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mappy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="toolbar">
      <div class="brand">Mappy</div>
      <div class="controls">
        <button id="add-card-btn" class="tool-btn">Karte erstellen</button>
        <button id="connect-btn" class="tool-btn">Verbinden</button>
        <label class="edge-type-wrap" for="edge-type-select">
          Verbindung:
          <select id="edge-type-select" class="edge-type-select">
            <option value="solid">durchgezogen</option>
            <option value="dashed">gestrichelt</option>
            <option value="directed">gerichtet</option>
            <option value="directed-dashed">gerichtet + gestrichelt</option>
          </select>
        </label>
        <button id="export-data-btn" class="tool-btn ghost">Daten exportieren</button>
        <button id="import-data-btn" class="tool-btn ghost">Daten importieren</button>
        <button id="export-image-btn" class="tool-btn ghost">Bild exportieren</button>
        <input id="import-file-input" type="file" accept=".json,application/json" hidden />
        <button id="delete-edge-btn" class="tool-btn ghost" disabled>Verbindung löschen</button>
        <button id="reset-view-btn" class="tool-btn ghost">Ansicht zentrieren</button>
      </div>
      <div class="status-wrap">
        <span id="status-pill" class="status-pill">Modus: Bewegen</span>
        <span id="zoom-pill" class="zoom-pill">100%</span>
      </div>
    </header>

    <main id="viewport" class="viewport" aria-label="Mindmap Canvas">
      <div id="world" class="world">
        <svg id="edges-layer" class="edges-layer" aria-hidden="true"></svg>
        <div id="nodes-layer" class="nodes-layer"></div>
      </div>
      <div id="card-color-menu" class="card-color-menu" hidden>
        <div class="card-color-title">Kartenfarbe</div>
        <div id="card-color-presets" class="card-color-presets"></div>
      </div>
      <div id="text-style-menu" class="text-style-menu" hidden>
        <button type="button" class="text-style-btn" data-cmd="bold" title="Fett"><strong>B</strong></button>
        <button type="button" class="text-style-btn" data-cmd="italic" title="Kursiv"><em>I</em></button>
        <button type="button" class="text-style-btn" data-cmd="underline" title="Unterstrichen"><u>U</u></button>
        <span class="text-style-sep"></span>
        <button type="button" class="text-style-btn" data-cmd="justifyLeft" title="Linksbündig">L</button>
        <button type="button" class="text-style-btn" data-cmd="justifyCenter" title="Zentriert">C</button>
        <button type="button" class="text-style-btn" data-cmd="justifyRight" title="Rechtsbündig">R</button>
      </div>
      <div class="hint">
        Scrollen: Zoom · Hintergrund ziehen: Pan · Text klicken: bearbeiten + Stilmenü · Rechtsklick: Farbe · Ecke ziehen: Größe · Export/Import oben
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
